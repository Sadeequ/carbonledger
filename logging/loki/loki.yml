auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory:  /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store:        tsdb
      object_store: filesystem
      schema:       v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # 30-day retention policy as required by issue #404
  retention_period: 720h   # 30 days exactly
  # Enhanced query limits for better searchability
  max_query_series: 5000
  max_query_parallelism: 16
  max_streams_per_user: 5000
  max_line_size: 256000
  # Ingestion rate limits
  ingestion_rate_mb: 8
  ingestion_burst_size_mb: 16
  # Per-stream rate limits
  per_stream_rate_limit: 3MB
  per_stream_rate_limit_burst: 15MB

compactor:
  working_directory:    /loki/compactor
  retention_enabled:    true
  delete_request_store: filesystem
  # Compaction interval for efficient storage
  compaction_interval:  2h

# Enhanced query performance
query_range:
  align_queries_with_step: true
  max_retries: 5
  parallelise_shardable_queries: true
  cache_results: true

# Table manager for retention
table_manager:
  retention_deletes_enabled: true
  retention_period: 720h

# Ruler for alerting rules (if using Loki ruler)
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true
